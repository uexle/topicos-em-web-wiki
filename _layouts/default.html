<!DOCTYPE html>
<html lang="{{ site.lang | default: 'pt-BR' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != '/' %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/wiki.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <a class="skip-link" href="#conteudo">Ir para o conteúdo</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__mark" aria-hidden="true"></span>
        <span class="site-brand__text">
          <span class="site-brand__course">{{ site.course.short }}</span>
          <span class="site-brand__tag">Wiki · {{ site.course.institution }}</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Principal">
        <a href="{{ '/' | relative_url }}">Início</a>
        <a href="{{ '/' | relative_url }}#artigos">Artigos</a>
      </nav>
    </div>
  </header>

  <main id="conteudo" class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p><strong>{{ site.course.name }}</strong> — {{ site.course.institution }}</p>
      <p class="site-footer__meta">{{ site.description }}</p>
    </div>
  </footer>
</body>
</html>
