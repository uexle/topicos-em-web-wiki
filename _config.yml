title: Wiki
description: Wiki em Markdown — GitHub Pages + Jekyll
theme: minima

# Repositório de projeto (usuario.github.io/nome-do-repo): defina url + baseurl (obrigatório para CSS do tema).
# Site só em usuario.github.io: use url: "" e baseurl: ""
url: "https://uexle.github.io"
baseurl: "/topicos-em-web-wiki"

collections:
  wiki:
    output: true
    permalink: /wiki/:name/

defaults:
  - scope:
      path: ""
      type: wiki
    values:
      layout: page
